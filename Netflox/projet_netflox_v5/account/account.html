<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="account.css">
    <title>Créer mon compte - Netflox</title>
    <link rel="icon" type="image/png" href="../image/Netflox_onglet.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
    <header>
        <div>
            <img src="../image/Netflox_logo.png" alt="Netflox">
            <h1>NETFLOX</h1>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="../index.html">Accueil</a></li>
            </ul>
        </nav>
        <nav class="sub-nav">
            <i class="bi bi-search"></i>
            <i class="bi bi-bell-fill"></i>
        </nav>
    </header>

    <main>
        <h2>Vous n'êtes pas encore inscrit, créez votre compte !</h2>

        <form>
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" required>
            </div>

            <div class="form-group">
                <label for="email">Adresse mail :</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telephone">Numéro de téléphone :</label>
                <input type="tel" id="telephone" name="telephone" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">CRÉER MON COMPTE</button>
        </form>
    </main>

    <footer>
        <div class="logo">
            <a target="_blank" href="https://www.facebook.com/"><i class="bi bi-facebook"></i></a>
            <a target="_blank" href="https://www.instagram.com/"><i class="bi bi-instagram"></i></a>
            <a target="_blank" href="https://www.x.com"><i class="bi bi-twitter"></i></a>
            <a target="_blank" href="https://www.youtube.com/"><i class="bi bi-youtube"></i></a>
        </div>
        <p>&copy;2023 - 2024 Netflox, Inc.</p>
    </footer>
</body>

</html>
